query ListAllProjects @auth(level: PUBLIC, insecureReason: "This operation is safe to expose to the public as it retrieves public project information.") {
  projects {
    id
    title
    description
    coverImageUrl
    liveUrl
    githubUrl
    technologies
    user {
      displayName
    }
  }
}

query GetMyExperiences @auth(level: USER, insecureReason: "This operation retrieves experiences associated with the currently logged-in user.") {
  experiences(where: {userId: {eq_expr: "auth.uid"}}) {
    id
    title
    organization
    startDate
    endDate
    description
    type
  }
}

mutation CreateSkill($name: String!, $proficiencyLevel: String, $category: String) @auth(level: USER, insecureReason: "This operation allows authenticated users to add their own skills.") {
  skill_insert(data: {
    userId_expr: "auth.uid",
    name: $name,
    proficiencyLevel: $proficiencyLevel,
    category: $category
  }) {
    id
  }
}

query GetPublicUserProfile($userId: UUID!) @auth(level: PUBLIC, insecureReason: "This operation retrieves public profile information for a specific user ID.") {
  user(id: $userId) {
    id
    displayName
    bio
    photoUrl
    linkedinUrl
    githubUrl
    personalWebsiteUrl
    isPublic
    experiences_on_user {
      id
      title
      organization
      startDate
      endDate
    }
    projects_on_user {
      id
      title
      description
      coverImageUrl
    }
    skills_on_user {
      id
      name
      proficiencyLevel
      category
    }
  }
}